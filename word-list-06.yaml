# ==============================================================================
# Word List 06
# ==============================================================================

heritage:   
  title: heritage
  text: __heritage__ [ˈherɪtɪdʒ] n. 遗产；传统 (文化/家族/自然)
  similar:
    - inheritance : '/ɪnherɪtɪn/ n. 继承；遗传；遗传学'
    - legacy: '/legəs/ n. 遗产；遗迹；遗产业'
  example:
    - The heritage of the ancient Egyptians is a rich source of inspiration for modern artists. 古埃及人的文化遗产是现代艺术家丰富的灵感源泉。
  vocabulary:
    - Egyptian: '/iˈdʒɪpʃn/   n. 埃及；埃及语'
    - inspiration: '/ɪnspərɪʃn/ n. 意象；灵感；创意'

appropriate:   
  title: appropriate 
  text: |
    __appropriate__ [əˈprəuprɪət] a. 适当的 

    __appropriate__ [əˈprəuprɪeɪt] vt. 占有，挪用；拨出（款项）
  similar:
    - proper : '/prəˈpru:p/ a. 适当的，恰当的；合适的'
    - suitable : '/ˈsəptəbl/ a. 适当的，合适的；合宜的'
  example: The company has made a appropriate investment in the area.

annual:   
  title: annual 
  text: |
    __annual__ [ˈænjuəl] a. 每年的，年度的  

    __annual__ n. 年刊，年鉴；一年生植物
  example: The annual report discusses the company's performance in the past year.

depict:   
  title: depict 
  text: __depict__ [dɪˈpɪkt] vt. 描绘，描述
  similar:
    - describe : '/dɪˈskrɪb/ vt. 描述，描写；阐述'
  example: The painting depicts a beautiful landscape.

literacy:   
  title: literacy 
  text: __literacy__ [ˈlɪtərəsɪ] n. 有文化；有教养；读写能力
  similar:
    - reading : '/ˈri:dɪŋ/ n. 阅读；读物；读者'
    - literature : '/ˈlɪtərətʃə/ n. 文学；文化；文献'
    - literate : '/ˈlɪtərət/ a. 有文化的，有教养的'
  example: The literacy rate of the children in the school is very low. 这所学校里儿童的识字率非常低。

calculate:   
  title: calculate 
  text: __caculate__ [ˈkælkjuleɪt] v. 计算，推算；估计，推测；计划，打算
  similar:
    - estimate : '/ɪˈstɪmət/ v. 估计，估价；评价'
    - plan : '/plæn/ v. 计划，打算；设计；创作'
  example: They believe if AI can handle tasks like calculating and driving for us, we will have more time for creating, thinking, and "being human"

luxury:   
  title: luxury 
  text: |
    __luxury__ [ˈlʌkʃərɪ] n. 豪华（品）；奢侈（品）  

    __luxury__ a. 奢华的
  example: The luxury car is expensive, but it has a lot of luxury features. "这辆豪华汽车价格不菲，却配备了诸多奢华配置。"

souvenir:   
  title: souvenir
  text: __souvenir__ [ˏsuːvəˈnɪə(r)] n. 纪念品，纪念物
  example: I bought a souvenir for my wedding.

purchase:   
  title: purchase 
  text: |
    __purchase__ [ˈpɜːtʃəs] vt. 买，购买  

    __purchase__ n. 购买的物品 anything that is bought
  similar:
    - buy : '/baɪ/ v. 买，购买；购物'
  root:
    - pur-,向前，在前，chase,追逐。引申词义得到，获得，握紧，抓牢，后用于指采购，购买
  example: One of the biggest considerations for a smartphone purchase is iOS or Android. "购买智能手机的最大考虑是iOS或Android系统。"

constant:   
  title: constant 
  text: |
    __constant__ [ˈkɔnstənt] a. 经常的，不断的；坚定的，永恒的，忠实的；持续的，不变的 happening all time; continuous
    
    __constant__ n. 常数，恒量
    
  similar:
    - permanent : '/pəˈmənənt/ a. 永久的，永恒的'
    - constantly : '/ˈkɔnstəntlɪ/ ad. 经常地，不断地'
    - steady : '/ˈsteɪd/ a. 稳定的，平稳的；静止的，静止不动的'

  example: Combined with a constant humidity of 90 percent or more, the temperature feels much warmer. "在常湿度90%以上，温度会显得很热。"

  vocabulary:
    - humidity: '/hjuˈmɪdəti/ n. 湿度；湿气；湿气层'
    

dormancy:   
  title: dormancy 
  text: __dormancy__ [['dɔ:mənsɪ] n. 休眠；催眠状态；冬眠；隐匿
  similar:
    - dormant : '/dɔ:mənt/ a. 休眠的，冬眠的'
    - insomnia : '/ɪnˈsəmniə/ n. 失眠，失眠症'
    - winter sleep: ' 冬眠，冬眠状态'
  example: The death is just a long dormancy! 死亡不过是一场长久的沉睡！

particular:   
  title: particular 
  text: |
    __particular__ [pəˈtɪkjulə(r)] a. 特殊的，特别的；特定的，个别的；详细的  

    __particular__ n. 详情，细目，细节
  similar:
    - especially : '/ˈɛsəli/ ad. 特别地，尤其地'
  example:


subscription:   
  title: subscription 
  text: __subscription__ [səbˈskrɪpʃn] n. 订阅，订购；订阅费，订购款；捐赠，捐助；签字，签署
  example: I signed a subscription for a newspaper.

pitch:   
  title: pitch 
  text: |
    __pitch__ [pɪtʃ] v. 投掷；颠簸；为……定音高  

    __pitch__ n. 沥青；场地；程度；最高点；音高
  similar:
    - pitcher : '/ˈpɪtʃə/ n. 球拍；投手；投球手'
    - pitchfork : '/ˈpɪtʃfɔːk/ n. 长柄叉；投篮叉'
    - threw: '/θəʊ/ v. 抛，扔；投，掷；投掷；投出；投掷球'
  example: All too often you pitch the ball short. 你老是把球投短了。

entitle:   
  title: entitle 
  text: __entitle__ [ɪnˈtaɪtl] vt. 给……权利（或资格）；给（书、文章等）题名；给……以称号
  similar:
    - title : '/tɪtl/ n. 称号；头衔；头衔等级'
  example: The novel entitled "The Great Gatsby" is a classic. "《大都会》是一部经典之作。"

shutter:   
  title: shutter 
  text: __shutter__ [ˈʃʌtə(r)] n. 百叶窗；（照相机的）快门
  example: The shutters were closed. 百叶窗 / 遮窗板是关着的

demolish:   
  title: demolish 
  text: __demolish__ [dɪˈmɔlɪʃ] vt. 破坏；拆除；驳倒（论点等），推翻
  similar:
    - demolition : '/dɪˈmɔlɪʃən/ n. 破坏，拆除；拆除工事'
    - destroy : '/dɪˈstrɔɪ/ vt. 破坏，毁坏；毁灭'
    - undermine : '/ʌndəˈmaɪn/ vt. 破坏，削弱；使受损'
  example: The company has demolished the old building to build a new one. 公司拆掉旧的建筑，建造新的。

durable:   
  title: durable 
  text: |
    __durable__ [ˈdjuərəbl] n. 耐用品  

    __durable__ a. 耐久的；耐用的
  similar:
    - continued: '/ˈkɔntinuəd/ a. 持续的，连续的'
    - sustain: '/səˈsteɪn/ vt. 维持，支撑；持续；支持'
  example: The durable goods are used in a wide range of industries. 耐用品被广泛用于各行各业。
cope:   
  title: cope 
  text: __cope__ [kəup] vi. （成功地）应付；（妥善地）处理
  example: The company has been able to cope with the financial crisis. 公司在财务危机中已经成功应对。
  vocabulary:
    - cope with: 应付，妥善处理

circulation:   
  title: circulation 
  text: __circulation__ [ˏsɜːkjuˈleɪʃn] n. （体液的）循环，（水、空气等的）流通；流传，传播；发行，发行量
  example: The circulation of the book is limited. 这本书的流通量有限。

tradition:   
  title: tradition 
  text: __tradition__ [trəˈdɪʃn] n. 传统；惯例
  example: The tradition of the family is to have a dinner together every year. 家庭的传统是每年一起吃饭。

benefit:   
  title: benefit 
  text: |
    __benefit__ [ˈbenɪfɪt] v. 使受益；有益于，得益于 to help

    __benefit__ n. 益处，好处；恩惠；救济金，保险金，津贴
  similar:
    - profit : '/prəˈfit/ n. 利润，利益；盈利'
  example: Despite the tremendous amount of time and money it cost to built, the Panama Canal has greatly benefited society. 尽管巴拿马运河的建造耗费了大量的时间与资金，但它为社会带来了巨大的益处。
  vocabulary:
    - benefit from: 受益于，得益于 “She greatly benefited from the training program. 她从培训项目中受益匪浅。”
    - mutual benefit: 互利共赢; “The partnership between the two companies resulted in mutual benefit. 两家公司的合作带来了互利共赢的结果。”

decay:   
  title: decay 
  text: |
    __decay__ [dɪˈkeɪ] n. 腐烂，腐朽；衰败（或衰退）状态  

    __decay__ v. 腐烂，腐朽；衰败，衰退
  similar:
    - deteriorate : '/dɪˈtɪrətər/ v. 变坏，变得衰退；恶化'
    - currupt : '/kəˈrʌpt/ a. 腐败的，腐烂的；不纯洁的'
    - recession : '/rɪˈseʃn/ n. （经济）衰退；（社会）不景气'
    - decline : '/dɪˈklaɪn/ v. 衰退，下降；（价格）下跌'
    - downturn : '/daʊnˈtɔːn/ n. （经济）衰退；（社会）不景气'
  example: The old wooden beams have decayed and are no longer usable. 这些陈旧的木质梁已经腐烂不堪，无法使用了。
  vocabulary:
    - beam : '/bɪm/ n. 木梁；梁柱；梁钉'

distribution:   
  title: distribution 
  text: __distribution__ [ˌdɪstrɪ'bju:ʃn] n. 分发，分配；配给物；散布，分布
  example: The distribution of the funds is important for the company's long-term success. 资金的分配对于公司长期成功至关重要。

defect:   
  title: defect 
  text: |
    __defect__ [ˈdiːfekt] n. 缺点，不足之处
    
    __defect__ [dɪˈfekt] vi. 叛变
  similar:
    - flaw : '/fləʊ/ n. 瑕疵，缺点'
    - fault : '/fɔːt/ n. 错误，缺陷'
    - shortcoming : '/ʃɔːtʃmənt/ n. 缺点，不足'
  example: 
    - 1. The product has several defects that need to be addressed. 该产品存在很多缺陷，需要加以改进。
    - 2. He decided to defect to the opposing team. 他决定叛逃到对方队伍
  vocabulary:
    - address: 处理，解决；解决问题 to fix a problem or issue

oppose:   
  title: oppose 
  text: __oppose__ [əˈpəuz] v. 反对、反抗
  similar:
    - opposed to : '/əˈpəuzədə(t)/ prep. 反对，反对； opposed to'
    - protest: '/prəˈtest/ v. 反对，抗议；抗议活动'
    - resist : '/rɪˈzɪst/ vi. 反抗，抵抗；抗拒'
    - fight : '/fɪt/ vi. 斗争，争吵；竞争'
  example: 
    - 1. The company opposes the proposal. 公司反对提案。
    - 2. His opinion is opposed to ours. 他的意见不同于我们的意见。

statistics:   
  title: statistics 
  text: __statistics__ [stəˈtɪstɪks] n. 统计数字，统计资料；统计学
  example: The statistics show that the company has a good reputation. 统计数据显示公司声誉良好。
  vocabulary:
    - reputation: '/ˌrepjuˈteɪʃ(ə)n/ n. 声誉，名誉；名望；名词'
    - repute: '/rɪˈpjuːt/ n. 声誉，名誉；名词'

stuffy:   
  title: stuffy 
  text: __stuffy__ [ˈstʌfɪ] a. 不透气的，（空气）不新鲜的，不通风的；乏味的
  similar:
    - damp : '/dæmp/ a. 霉的，潮湿的；湿气的'
  example: The room is stuffy. 房间很潮湿。

approximately:   
  title: approximately 
  text: __approximately__ [əˈprɒksɪmətli] ad. 近似，大约
  example: The price is approximately $100. 价格大约是100美元。

excusable:   
  title: excusable 
  text: __excusable__ [ɪkˈskju:zəbl] a. 可原谅的；可谅解的；可容许的
  similar:
    - justifiable : '/ˈdʒʌstəbl/ a. 可原谅的，可谅解的'
  example: The company has been excusable for the delay. 该公司对此次延误情有可原。

propose:   
  title: propose 
  text: __propose__ [prəˈpəuz] v. 提议，建议；提名，推荐；打算；（向某人）求婚 to make a suggestion
  example: A combined effect between Mount Everest officials and the city of Kathmandu has been proposed. 有人提议由珠峰管理方与加德满都市共同协作实施联合举措。
  vocabulary:
    - a combined effect: 联合作用；联合效应
    - Everest: 珠穆朗玛峰；珠穆朗玛斯山脉
    - Kathmandu: 加德满都；加德满都市

ornament:   
  title: ornament 
  text: |
    __ornament__ [ˈɔːnəmənt] n. 装饰；装饰物  

    __ornament__ vt. 装饰，修饰，美化
  similar:
    - adorn : '/əˈdɔːn/ vt. 装饰，装饰；装饰物'
    - adornment : '/əˈdɔːnmənt/ n. 装饰物，装饰品'
    - decoration : '/dɔːkən(ə)n/ n. 装饰，装饰品'
  example: The ornaments on the walls are beautiful. 墙壁上装饰的图案精美。

energetic:   
  title: energetic 
  text: __energetic__ [ˌenəˈdʒetɪk] a. 有力的，精力旺盛的；积极的
  example: The energetic young man is always ready to help others. 充满活力的年轻人总是乐于帮助他人。

atmospheric:   
  title: atmospheric 
  text: __atmospheric__ [ˏætməsˈferɪk] a. 大气的，空气的；大气层的；大气所引起的
  example: The atmospheric pressure is high. 大气压力很高。

cooperative:   
  title: coorperative
  text: |
    __cooperative__ [kəuˈɔpərətɪv] a. 合作的，协作的  

    __cooperative__ n. 合作社
  similar:
    - cooperate : '/kəuˈɔpəreɪt/ vi. 合作，协作；合作创造；合作办理'
    - collaborative: '/kəuˈlabərətɪv/ a. 合作的，协作的；协同的'
  example: The company is a cooperative that provides services to other companies. 该公司是一家合作社，为其他公司提供服务。

corrode:   
  title: corrode 
  text: __corrode__ [kəˈrəud] v. 腐蚀；侵蚀
  similar:
    - corrosion : '/kəˈrəʊʃən/ n. 腐蚀，侵蚀；腐蚀性物质'
    - erode : '/ɪərəʊd/ v. 侵蚀，腐蚀；侵蚀物体'
  example: The corroded metal has been removed. 腐蚀的金属已经被拆除。

honour:   
  title: honour 
  text: |
    __honour__ [ˈɔnə(r)] n. 光荣；尊敬  

    __honour__ vt. 向……示敬意；信守，执行（承诺）
  example: The company has honored its commitments to the environment. 公司尊重其对环境的承诺。

soluble:   
  title: soluble 
  text: __soluble__ [ˈsɔljubl] a. 可溶的；可解决的
  similar:
    - solvent : '/ˈsɔljəvənt/ a. 可溶的，可溶解的'
    - dissolve : '/dɪˈsəlv/ v. 溶解，溶解物；分解，分离'
  example: The soluble matter is used in the manufacture of medicines. 可溶性物质用于制药。

underline:   
  title: underline 
  text: __underline__ [ˏʌndəˈlaɪn] vt. 画线于……之下；强调
  similar:
    - hightlight : '/ˈhɪtlaɪt/ vt. 强调，突出；着重'
    - emphasize : '/ɪmˈpəʃaɪz/ vt. 强调，强调；着重'
    - stress : '/strɛs/ n. 重点，强调；强调语气；重视'
  example:
    - 1. He undederlined the important points in the report. 他划出了报告中的重要要点


activate:   
  title: activate 
  text: __activate__ [ˈæktɪveɪt] vt. 激活；使活动，使活化
  example: The machine needs to be activated to start the process. 机器需要被激活才能开始工作。

major:   
  title: major 
  text: |
    __major__ [ˈmeɪdʒə(r)] a. 主要的 main; (one of the) most important

    __major__ n. 专业（学生）  vi. 主修，专攻
  example: another major difference in the weather between these two cites is that its worst weather occurs in the winter

objective:   
  title: objective 
  text: |
    __objective__ [əbˈdʒektɪv] n. 目标，目的  

    __objective__ a. 客观的
  similar:
    - subjective : '/ˈsʌbəktɪv/ a. 主观的，个人的；个人的；客观的'
    - subject : '/ˈsʌbɪt/ n. 主题，主题；学科；学科专业；学科范围'
    - target : '/ˈtɑːrɪt/ n. 目标，目的；靶子；目标物；目标人物'
  example: The objective of the project is to develop a new product. 该项目的目标是开发新产品。

concentrate:   
  title: concentrate 
  text: |
    __concentrate__ [ˈkɔnsntreɪt] v. 全神贯注，全力以赴；集中，聚焦；浓缩  

    __concentrate__ n. 浓缩物，浓缩液
  example: The students are concentrating on their studies. 学生们全神贯注于学习。
  vocabulary:
    - concentrate on: 全神贯注于；集中于；专心于

conflict:   
  title: conflict 
  text: |
    __conflict__ [ˈkɔnflɪkt] n. 冲突 a disagreement

    __conflict__ [kənˈflikt] vi. 冲突，抵触
  example: 
    - 1. “The new policy conflicts with existing regulations.” 新政策与现有规定相冲突。
    - 2. “There was a conflict between the two teams over the project timeline.” 两个团队在项目时间线上产生了冲突。
  vocabulary:
    - sb/sth conflicts over [sth]: 某人/某事 与某事发生冲突
    - sth conflicts with [sth]: 某事 与 某事 发生冲突
antidote:   
  title: antidote 
  text: __antidote__ [ˈæntɪdəut] n. 解毒药；矫正方法
  example: The antidote is used to treat the infection. 解毒剂用于治疗感染。


discover:   
  title: discover 
  text: __discover__ [dɪsˈkʌvə(r)] vt. 发现，找到；发觉
  similar:
    - find : '/faɪnd/ vt. 发现，找到；查出；发现'
    - reveal : '/rɪˈvɜːl/ vt. 透露，揭露；揭发；揭示'
  example: The company has discovered a new market. 公司发现了一个新的市场。

continent:   
  title: continent 
  text: __continent__ [ˈkɔntɪnənt] n. 大陆，陆地；洲
  example: The continent is divided into several regions. 大陆被分割成多个地区。

turret:   
  title: turret 
  text: __turret__ [ˈtʌrɪt] n. 塔楼，角楼
  example: The turret is a large structure that can shoot down enemy aircraft. 塔楼是一座可以射击敌机的大型建筑。
  vocabulary:
    - shoot down: 射击；击落；击伤
    - aircraft: 飞机；航空器

elastic:   
  title: elastic 
  text: |
    __elastic__ [ɪˈlæstɪk] a. 有弹性的；灵活的  

    __elastic__ n. 松紧带
  similar:
    - flexible : '/ˈfleksəbl/ a. 灵活的，柔韧的；可变的'
    - stretch : '/strɛt/ v. 伸长，拉长；拉伸；拉紧'
  example: “The elastic fabric can stretch without breaking.” 有弹性的布料可以拉伸而不会断裂。
  vocabulary:
    - stretch without breaking: 拉伸而不破裂
    - fabric: '/ˈfæbrɪk/ n. 布料，织物；纤维；纤维素'

enhance:   
  title: enhance 
  text: __inhance__ [ɪnˈhɑːns] vt. 提高，增强；增进
  similar:
    - improve : '/ɪmˈpruː/ vt. 改进，改善；提高，增强'
  example: The new product enhances the company's sales. 新产品增强了公司的销量。

demonstration:   
  title: demonstration 
  text: __demonstration__ [ˏdemənˈstreɪʃn] n. 论证，证明；示范；显示，表露；示威游行
  example: The demonstration was a success. 示威游行取得了成功。

interrupt:   
  title: interrupt 
  text: __interrupt_ [ˏɪntəˈrʌpt] v. 中断，中止；阻碍；打断，打扰
  similar:
    - disturb : '/dɪˈstɜːt/ vt. 打扰，干扰；使不安；使烦恼'
  example: The teacher interrupted the class to ask a question. 老师打断了课堂，要求学生提问。

redundant:   
  title: redundant 
  text: __redundant__ [rɪˈdʌndənt] a. （因人员过剩而）被解雇的；多余的，过剩的；累赘的，冗长的
  example: The redundant workers are causing a lot of problems. 多余的工人正在造成很多问题。

mishandle:   
  title: mishanle 
  text: __mishandle__ [ˏmɪsˈhændl] vt. 粗暴地对待；错误地处理，胡乱操作
  example: “The company received complaints about the mishandling of their products.” 公司收到了关于他们产品被错误处理的投诉。

discovery:   
  title: discovery 
  text: __discovery__ [dɪˈskʌvərɪ] n. 发现 the finding of something new
  example: “She made a great discovery while conducting her research.” 她在进行研究时做出了一个重要的发现。
  vocabulary:
    - make a discovery: 发现；发明；发现新事物
    - conduct a research: 进行研究；研究；调查
    - conduct: 进行；组织；指挥；指导；指挥作战

alcohol:   
  title: alcohol 
  text: __alcohol__ [ˈælkəhɔl] n. 含酒精饮料，酒；酒精
  example: “He enjoys drinking alcohol after work.” 他喜欢下班后喝酒精饮料。

suppression:   
  title: suppression 
  text: __supression__ [səˈpreʃn] n. 镇压，压制，抑制；扑灭
  example: 
    - 1. “The government has taken steps to suppress the spread of the virus.” 政府采取了措施来抑制病毒的传播。
    - 2. “The suppression of the violence has caused a lot of damage.” 压制暴力导致了大量损失。

mainly:   
  title: mainly 
  text: __mainly__ [ˈmeɪnli] ad. 大体上，主要地
  similar:
    - basically : '/ˈbæzɪli/ ad. 基本上，大体上'
    - mostly : '/ˈməʊli/ ad. 主要地，大部分地'
    - largely : '/ˈlædli/ ad. 广泛地，大量地'
    - primarily : '/prɪˈmənli/ ad. 主要地，主要的'
    - chiefly : '/ˈʃaɪəli/ ad. 主要地，主要的'
    - chief: '/tʃiːf/ adj. 首要的 主要的'
  example: The company mainly focuses on the sales of its products. 公司主要以销售产品为主。


property:   
  title: property 
  text: __property__ [ˈprɔpətɪ] n. 财产，所有物；性质，特性；房产，地产
  example: The property is owned by the company. 该财产属于公司所有。

naked:   
  title: naked 
  text: __naked__ [ˈneɪkɪd] a. 裸体的，无遮蔽的
  similar:
    - unclothed : '/ʌnˈkləʊθd/ a. 裸体的，无衣服的'
    - uncovered : '/ʌnˈkʌvəd/ a. 未被发现的，未被发现的'
    - bare : '/beə(r)/ a. 裸体的，无遮蔽的'
    - unclad : '/ʌnˈklæd/ a. 未被衣服覆盖的，未被衣服遮盖的'
  example:
    - 1.“He felt embarrassed when he realized he was naked.” 他意识到自己裸体时感到尴尬。

feature:   
  title: feature 
  text: |
    __feature__ [ˈfiːtʃə(r)] n. 特征，特色；[pl.] 面貌，相貌；特定，专题节目；故事片  

    __feature__ v. 以……为特色；由……主演；占重要地位
  example: 
    - 1.The movie features a beautiful woman. 这部电影以美丽的女演员而闻名。
    - 2.The car’s most notable feature is its powerful engine. 这辆车最显著的特征是其强大的发动机。

lens:   
  title: lens 
  text: __lens__ [lenz] n. 透镜；镜片；镜头
  example: The lens is used to focus on the subject. 镜头用于聚焦主题。

coordinator:   
  title: coordinator 
  text: __coodinator__ [kəʊ'ɔ:dɪneɪtə] n. 协调者
  example: The coordinator is responsible for organizing the event. 协调者负责安排活动。

nourish:   
  title: nourish 
  text: __nourish__ [ˈnʌrɪʃ] vt. 养育，滋养；培养（情绪、观点等）
  similar:
    - feed: '/fɪd/ vt. 喂养；供给；提供；赠送'
    - nurture: '/ˈnʌʃə/ vt. 养育，培养；教育；培养（情绪、观点等）'
  example: The children are nourished by their parents. 孩子们被父母养育。

crisp:   
  title: crisp
  text: |
    __crisp__ [krɪsp] a. 脆的；利落的  

    __crisp__ n.[pl.] 油炸土豆片
  example: The crisp crumbs are delicious. 脆的面包片很好吃。
  vocabulary:
    - crumb: /krʌm/ n. 面包屑，面包片

guilty:   
  title: guilty
  text: __guilty__ ['ɡɪltɪ] a. 内疚的；有罪的
  example: Although it was completely innocent, Claire still felt guilty. 尽管是无心之举，Claire仍然感到内疚。

crack:   
  title: crack
  text: |
    __crack__ [kræk] n. 裂缝，缝隙；爆裂声  

    __crack__ v. （使）破裂；（使）发出爆裂声；重击；崩溃，瓦解
  example: The crack in the door was very loud. 门缝里发出了很大的爆裂声。

 
